<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>仓位手账 - Position Ledger</title>
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#FFFFFF">
    <link rel="apple-touch-icon" href="icon-512.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <style>
        :root {
            --bg-color: #F4F6F9;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --accent-blue: #007AFF;
            --profit-green: #34C759;
            --loss-red: #FF3B30;
            --border-color: #E5E5EA;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 90px; -webkit-font-smoothing: antialiased; }
        
        /* 融合且慢与大厂风的高端头部 */
        header { padding: 30px 24px 15px; background: var(--card-bg); position: relative; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .header-title { font-size: 13px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; }
        .refresh-tag { font-size: 11px; background: #E5E5EA; padding: 3px 8px; border-radius: 10px; color: var(--text-main); cursor: pointer; }

        /* 多维看板 Tab（切换展示核心指标） */
        .metrics-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px 15px; background: var(--card-bg); border-bottom: 1px solid var(--border-color); }
        .tab-card { background: #F8F9FA; padding: 12px; border-radius: 12px; border: 1px solid transparent; cursor: pointer; transition: all 0.2s; }
        .tab-card.active { background: #FFF; border-color: var(--accent-blue); box-shadow: 0 4px 12px rgba(0,122,255,0.08); }
        .tab-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .tab-value { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }

        /* 隐藏的次级衍生指标栏 */
        .sub-metrics { display: flex; gap: 20px; padding: 12px 24px; background: #F8F9FA; font-size: 12px; color: var(--text-muted); border-bottom: 1px solid var(--border-color); }
        .sub-metrics span strong { color: var(--text-main); font-weight: 600; }

        /* 全局卡片 */
        .card { background: var(--card-bg); margin: 16px 16px 0; padding: 20px; border-radius: 20px; border: 1px solid var(--border-color); box-shadow: 0 4px 16px rgba(0,0,0,0.02); }
        .card-title-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-title { font-size: 15px; font-weight: 600; color: var(--text-main); }
        
        /* 比较基准选择器 */
        .benchmark-select { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }

        /* 持仓列表、比例条与表单 */
        .position-progress-bar { display: flex; height: 7px; border-radius: 4px; overflow: hidden; margin-bottom: 16px; background: #E5E5EA; }
        .progress-segment { height: 100%; transition: width 0.3s; }
        #allocation-legend { display: flex; flex-wrap: wrap; gap: 12px; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #F2F2F7; }
        .item-row:last-child { border-bottom: none; }
        .item-left { display: flex; flex-direction: column; }
        .item-right { text-align: right; display: flex; flex-direction: column; }
        .primary-text { font-size: 15px; font-weight: 600; }
        .secondary-text { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
        .ticker-tag { font-size: 10px; background: #E5E5EA; padding: 1px 4px; border-radius: 4px; font-weight: bold; margin-left: 4px; }

        select, input { width: 100%; padding: 14px; margin-bottom: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: #F2F2F7; font-size: 15px; color: var(--text-main); outline: none; }
        button { width: 100%; padding: 14px; background: var(--text-main); color: #FFF; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
        button.secondary { background: transparent; color: var(--accent-blue); border: 1px solid var(--accent-blue); margin-top: 10px; }

        /* 优雅的底层导航 */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { font-size: 11px; color: var(--text-muted); text-decoration: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; font-weight: 500; }
        .nav-item.active { color: var(--accent-blue); font-weight: 600; }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }

        .view-panel { display: none; }
        .view-panel.active { display: block; }
        .up-trend { color: var(--profit-green) !important; }
        .down-trend { color: var(--loss-red) !important; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="header-title">仓位手账 • 风起海外</div>
            <div class="refresh-tag" id="refresh-btn" onclick="fetchRealtimePrices()">点击刷新行情</div>
        </div>
    </header>

    <div class="metrics-tabs">
        <div class="tab-card active" id="tab-assets" onclick="switchMetricTab('assets')">
            <div class="tab-label">总资产 (USD)</div>
            <div class="tab-value" id="lbl-total-assets">$0.00</div>
        </div>
        <div class="tab-card" id="tab-roi" onclick="switchMetricTab('roi')">
            <div class="tab-label">累计收益率</div>
            <div class="tab-value up-trend" id="lbl-total-roi">+0.00%</div>
        </div>
        <div class="tab-card" id="tab-nav" onclick="switchMetricTab('nav')">
            <div class="tab-label">当前净值</div>
            <div class="tab-value" id="lbl-current-nav">1.0000</div>
        </div>
    </div>

    <div class="sub-metrics">
        <span>年化收益率: <strong class="up-trend" id="lbl-annual-roi">+0.00%</strong></span>
        <span>累计收益: <strong id="lbl-profit-amount">$0.00</strong></span>
        <span>现金留存: <strong id="lbl-global-cash">$0.00</strong></span>
    </div>

    <div id="view-overview" class="view-panel active">
        <div class="card">
            <div class="card-title-area">
                <div class="card-title" id="chart-dynamic-title">净值走势 (NAV)</div>
                <div class="benchmark-select">
                    <input type="checkbox" id="chk-benchmark" onchange="updateChart()" checked style="width:14px;height:14px;margin:0;"> 对标标普500
                </div>
            </div>
            <div style="position:relative; width:100%; height:190px;">
                <canvas id="navChart"></canvas>
            </div>
        </div>
        <div class="card">
            <div class="card-title">当前仓位权重分布</div>
            <div class="position-progress-bar" id="allocation-bar"></div>
            <div id="allocation-legend"></div>
        </div>
    </div>

    <div id="view-holdings" class="view-panel">
        <div class="card">
            <div class="card-title">多账户实时合并持仓 (30s自动刷新)</div>
            <div id="holdings-list"></div>
        </div>
    </div>

    <div id="view-transactions" class="view-panel">
        <div class="card">
            <div class="card-title">记一笔交易</div>
            <select id="tx-account">
                <option value="富途证券">富途证券</option>
                <option value="老虎证券">老虎证券</option>
                <option value="长桥证券">长桥证券</option>
            </select>
            <input type="text" id="tx-ticker" placeholder="股票代码 (如 AAPL 或 QQQ)" style="text-transform:uppercase;">
            <select id="tx-type">
                <option value="BUY">买入 (BUY)</option>
                <option value="SELL">卖出 (SELL)</option>
                <option value="DIVIDEND">分红冲减成本 (DIVIDEND)</option>
            </select>
            <input type="number" id="tx-amount" step="0.01" placeholder="交易总金额 (美元)">
            <input type="number" id="tx-shares" step="0.01" placeholder="成交股数 (分红填0)">
            <button onclick="addTransaction()">确认记账</button>
        </div>
        <div class="card">
            <div class="card-title">历史流水</div>
            <div id="tx-history-list"></div>
        </div>
    </div>

    <div id="view-settings" class="view-panel">
        <div class="card">
            <div class="card-title">账户现金状态</div>
            <div id="account-balances-list"></div>
        </div>
        <div class="card">
            <div class="card-title">数据本地备份与恢复</div>
            <button onclick="exportData()">导出数据备份 (JSON)</button>
            <button class="secondary" onclick="document.getElementById('import-file').click()">导入数据恢复</button>
            <input type="file" id="import-file" style="display:none;" onchange="importData(this)">
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="switchView('overview', this)"><span class="nav-icon">⚏</span>总览</div>
        <div class="nav-item" onclick="switchView('holdings', this)"><span class="nav-icon">⚱</span>持仓</div>
        <div class="nav-item" onclick="switchView('transactions', this)"><span class="nav-icon">⇄</span>流水</div>
        <div class="nav-item" onclick="switchView('settings', this)"><span class="nav-icon">⚙</span>管理</div>
    </nav>

    <script>
        // 核心种子数据
        let appData = {
            inceptionDate: "2025-05-09",
            accounts: { "富途证券": { cash: 500 }, "老虎证券": { cash: 347 }, "长桥证券": { cash: 0 } },
            transactions: [
                { id: 1, account: "富途证券", ticker: "AAPL", type: "BUY", amount: 600, shares: 4, date: "2025-05-09" },
                { id: 2, account: "老虎证券", ticker: "AAPL", type: "BUY", amount: 300, shares: 2, date: "2025-06-12" }
            ],
            prices: { "AAPL": 187.50 },
            navHistory: [
                { date: "2025-05-09", nav: 1.0000, spy: 1.0000 },
                { date: "2025-12-31", nav: 1.1540, spy: 1.1120 },
                { date: "2026-05-31", nav: 1.3282, spy: 1.2210 }
            ]
        };

        let currentMetricMode = 'assets'; // assets, roi, nav

        if (localStorage.getItem('position_ledger_data')) {
            try { appData = JSON.parse(localStorage.getItem('position_ledger_data')); } catch(e) {}
        }

        // 腾讯财经行情抓取核心（支持跨域轮询）
        async function fetchRealtimePrices() {
            const btn = document.getElementById('refresh-btn');
            btn.innerText = "正在同步行情...";
            const holdings = calculateHoldings();
            const tickers = Object.keys(holdings).filter(tk => holdings[tk].shares > 0);
            
            if(tickers.length === 0) {
                btn.innerText = "点击刷新行情";
                return;
            }

            // 构造腾讯美股/港股/A股统一代码转换
            const qList = tickers.map(tk => {
                if(/^\d+$/.test(tk)) return tk.length === 5 ? `hk${tk}` : `sh${tk}`;
                return `us${tk}`; // 默认当作美股代码处理
            }).join(',');

            try {
                // 使用 script 标签加载或 fetch 动态获取数据
                const res = await fetch(`https://qt.gtimg.cn/q=${qList}`);
                const text = await res.text();
                const lines = text.split(';');
                lines.forEach(line => {
                    if(!line.trim()) return;
                    const parts = line.split('=');
                    if(parts.length < 2) return;
                    const tickerCode = parts[0].trim().replace('v_', '');
                    const dataFields = parts[1].split('~');
                    if(dataFields.length > 3) {
                        const rawPrice = parseFloat(dataFields[3]);
                        // 反向映射回原代码
                        const cleanTicker = tickerCode.replace('us','').replace('hk','').toUpperCase();
                        if(!isNaN(rawPrice) && rawPrice > 0) {
                            appData.prices[cleanTicker] = rawPrice;
                        }
                    }
                });
                btn.innerText = "行情已是最新";
                saveData();
                setTimeout(() => { btn.innerText = "点击刷新行情"; }, 2000);
            } catch(e) {
                console.error("行情抓取失败: ", e);
                btn.innerText = "网络超时，稍后重试";
            }
        }

        function saveData() {
            localStorage.setItem('position_ledger_data', JSON.stringify(appData));
            renderAll();
        }

        function calculateHoldings() {
            let holdings = {}; 
            appData.transactions.forEach(tx => {
                let tk = tx.ticker.toUpperCase().trim();
                if (!holdings[tk]) {
                    holdings[tk] = { shares: 0, netCost: 0, currentPrice: appData.prices[tk] || 0 };
                }
                if (tx.type === 'BUY') {
                    holdings[tk].shares += parseFloat(tx.shares);
                    holdings[tk].netCost += parseFloat(tx.amount);
                } else if (tx.type === 'SELL') {
                    holdings[tk].shares -= parseFloat(tx.shares);
                    holdings[tk].netCost -= parseFloat(tx.amount);
                } else if (tx.type === 'DIVIDEND') {
                    holdings[tk].netCost -= parseFloat(tx.amount);
                }
            });
            return holdings;
        }

        function switchMetricTab(mode) {
            currentMetricMode = mode;
            document.querySelectorAll('.tab-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            
            const titleMap = { 'assets': '总资产走势 (USD)', 'roi': '累计收益率走势 (%)', 'nav': '净值走势 (NAV)' };
            document.getElementById('chart-dynamic-title').innerText = titleMap[mode];
            updateChart();
        }

        let navChartInstance = null;
        function updateChart() {
            if (typeof Chart === 'undefined') return;
            try {
                const ctx = document.getElementById('navChart').getContext('2d');
                if (navChartInstance) { navChartInstance.destroy(); }

                let chartLabels = appData.navHistory.map(h => h.date);
                let primaryData = [];
                let labelName = '';

                // 根据看板多维切换图表映射路径
                if (currentMetricMode === 'nav') {
                    primaryData = appData.navHistory.map(h => h.nav);
                    labelName = '我的净值';
                } else if (currentMetricMode === 'roi') {
                    primaryData = appData.navHistory.map(h => (h.nav - appData.navHistory[0].nav) * 100);
                    labelName = '我的收益率 (%)';
                } else {
                    // 默认资产走势（近似通过初始投入x净值还原）
                    primaryData = appData.navHistory.map(h => h.nav * 1000); 
                    labelName = '总资产规模';
                }

                let datasets = [{
                    label: labelName,
                    data: primaryData,
                    borderColor: '#007AFF',
                    borderWidth: 2.5,
                    pointBackgroundColor: '#FFFFFF',
                    pointRadius: 4,
                    tension: 0.2,
                    fill: false
                }];

                // 标普500基准对比线联动逻辑
                if(document.getElementById('chk-benchmark').checked && currentMetricMode !== 'assets') {
                    let benchmarkData = [];
                    if(currentMetricMode === 'nav') {
                        benchmarkData = appData.navHistory.map(h => h.spy || 1.0);
                    } else {
                        benchmarkData = appData.navHistory.map(h => ((h.spy || 1.0) - 1.0) * 100);
                    }
                    datasets.push({
                        label: '标普500基准',
                        data: benchmarkData,
                        borderColor: '#AF52DE',
                        borderWidth: 1.5,
                        borderDash: [4, 4],
                        pointRadius: 0,
                        tension: 0.2,
                        fill: false
                    });
                }

                navChartInstance = new Chart(ctx, {
                    type: 'line',
                    data: { labels: chartLabels, datasets: datasets },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { x: { grid: { display: false } }, y: { grid: { color: '#E5E5EA' } } }
                    }
                });
            } catch(e) { console.error("图表错误:", e); }
        }

        function renderAll() {
            try {
                const holdings = calculateHoldings();
                let totalStockValue = 0;
                let totalCost = 0;

                Object.keys(holdings).forEach(tk => {
                    let h = holdings[tk];
                    if(h.shares > 0) {
                        totalStockValue += h.shares * (appData.prices[tk] || h.currentPrice);
                        totalCost += h.netCost;
                    }
                });
                let totalCash = Object.values(appData.accounts).reduce((sum, acc) => sum + acc.cash, 0);
                let grandTotal = totalStockValue + totalCash;

                // 计算账面总盈亏
                let profitAmount = grandTotal - (totalCost + totalCash); 

                document.getElementById('lbl-total-assets').innerText = `$${grandTotal.toLocaleString('en-US', {maximumFractionDigits:2})}`;
                document.getElementById('lbl-global-cash').innerText = `$${totalCash.toFixed(2)}`;
                document.getElementById('lbl-profit-amount').innerText = `$${profitAmount.toFixed(2)}`;
                
                if (appData.navHistory && appData.navHistory.length > 0) {
                    let latestNav = appData.navHistory[appData.navHistory.length - 1].nav;
                    document.getElementById('lbl-current-nav').innerText = latestNav.toFixed(4);
                    let initialNav = appData.navHistory[0].nav;
                    let roi = ((latestNav - initialNav) / initialNav) * 100;
                    
                    const roiEl = document.getElementById('lbl-total-roi');
                    roiEl.innerText = `${roi >= 0 ? '+' : ''}${roi.toFixed(2)}%`;
                    if(roi < 0) { roiEl.className = "tab-value tragic-red"; }

                    // 精准年化收益率计算
                    let incDate = new Date(appData.inceptionDate || "2025-05-09");
                    let today = new Date();
                    let diffDays = Math.max(1, Math.floor((today - incDate) / (1000 * 60 * 60 * 24)));
                    let annualRoi = (Math.pow(1 + (roi/100), 365 / diffDays) - 1) * 100;
                    document.getElementById('lbl-annual-roi').innerText = `${annualRoi >= 0 ? '+' : ''}${annualRoi.toFixed(2)}%`;
                }

                // 渲染持仓列表 (结合大厂极简风格卡片)
                const holdingsList = document.getElementById('holdings-list');
                holdingsList.innerHTML = '';
                let hasHoldings = false;

                Object.keys(holdings).forEach(tk => {
                    let h = holdings[tk];
                    if(h.shares <= 0) return;
                    hasHoldings = true;
                    
                    let curPrice = appData.prices[tk] || h.currentPrice;
                    let dilutedCostPrice = h.netCost / h.shares;
                    let currentVal = h.shares * curPrice;
                    let pl = currentVal - h.netCost;
                    let plRate = h.netCost > 0 ? (pl / h.netCost) * 100 : 0;

                    holdingsList.innerHTML += `
                        <div class="item-row">
                            <div class="item-left">
                                <span class="primary-text">${tk}<span class="ticker-tag">$${curPrice.toFixed(2)}</span></span>
                                <span class="secondary-text">持股: ${h.shares.toFixed(1)} | 成本: $${dilutedCostPrice.toFixed(2)}</span>
                            </div>
                            <div class="item-right">
                                <span class="primary-text">$${currentVal.toFixed(2)}</span>
                                <span class="secondary-text ${pl >= 0 ? 'up-trend' : 'down-trend'}">
                                    ${pl >= 0 ? '+' : ''}${pl.toFixed(2)} (${plRate.toFixed(2)}%)
                                </span>
                            </div>
                        </div>`;
                });

                if(!hasHoldings) {
                    holdingsList.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:20px; font-size:13px;">暂无持仓资产</div>';
                }

                // 权重分布带
                const bar = document.getElementById('allocation-bar');
                const legend = document.getElementById('allocation-legend');
                bar.innerHTML = ''; legend.innerHTML = '';
                const colors = ['#007AFF', '#34C759', '#AF52DE', '#FF9500', '#5AC8FA'];
                let colorIdx = 0;

                Object.keys(holdings).forEach(tk => {
                    let h = holdings[tk];
                    if(h.shares <= 0 || grandTotal === 0) return;
                    let pct = ((h.shares * (appData.prices[tk] || h.currentPrice)) / grandTotal) * 100;
                    let c = colors[colorIdx % colors.length];
                    colorIdx++;

                    bar.innerHTML += `<div class="progress-segment" style="width: ${pct}%; background: ${c}"></div>`;
                    legend.innerHTML += `<span style="font-size:12px; display:inline-flex; align-items:center; gap:4px;"><i style="display:inline-block; width:8px; height:8px; background:${c}; border-radius:50%;"></i> ${tk} ${pct.toFixed(1)}%</span>`;
                });

                if (totalCash > 0 && grandTotal > 0) {
                    let cashPct = (totalCash / grandTotal) * 100;
                    bar.innerHTML += `<div class="progress-segment" style="width: ${cashPct}%; background: #E5E5EA"></div>`;
                    legend.innerHTML += `<span style="font-size:12px; display:inline-flex; align-items:center; gap:4px; color:var(--text-muted);"><i style="display:inline-block; width:8px; height:8px; background:#E5E5EA; border-radius:50%;"></i> 现金 ${cashPct.toFixed(1)}%</span>`;
                }

                document.getElementById('tx-history-list').innerHTML = appData.transactions.map(t => `
                    <div class="item-row">
                        <div class="item-left"><span class="primary-text">${t.account} · ${t.ticker}</span><span class="secondary-text">${t.date}</span></div>
                        <div class="item-right"><span class="primary-text">${t.type === 'BUY' ? '买入' : t.type === 'SELL' ? '卖出' : '分红'}</span><span class="secondary-text">${t.shares}股 / $${t.amount}</span></div>
                    </div>`).reverse().join('');

                document.getElementById('account-balances-list').innerHTML = Object.keys(appData.accounts).map(a => `
                    <div class="item-row"><div class="item-left"><span class="primary-text">${a}</span></div><div class="item-right"><span class="primary-text">$${appData.accounts[a].cash.toFixed(2)}</span></div></div>`).join('');
            } catch(e) { console.error("渲染异常:", e); }
        }

        function addTransaction() {
            const acc = document.getElementById('tx-account').value;
            const tk = document.getElementById('tx-ticker').value.toUpperCase().trim();
            const type = document.getElementById('tx-type').value;
            const amt = parseFloat(document.getElementById('tx-amount').value);
            const sh = parseFloat(document.getElementById('tx-shares').value) || 0;

            if(!tk || isNaN(amt)) return alert("请填写完整交易信息");

            appData.transactions.push({
                id: Date.now(), account: acc, ticker: tk, type: type, amount: amt, shares: sh, date: new Date().toISOString().split('T')[0]
            });

            if(type === 'BUY') appData.accounts[acc].cash -= amt;
            if(type === 'SELL' || type === 'DIVIDEND') appData.accounts[acc].cash += amt;

            saveData();
            fetchRealtimePrices();
        }

        function switchView(viewId, element) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            element.classList.add('active');
            if (viewId === 'overview') { updateChart(); }
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `仓位手账_升级版_${new Date().toISOString().split('T')[0]}.json`);
            downloadAnchor.click();
        }

        function importData(input) {
            const reader = new FileReader();
            reader.onload = function(){
                try {
                    appData = JSON.parse(reader.result);
                    saveData();
                    updateChart();
                    alert("数据同步成功");
                } catch(e) { alert("文件解析有误"); }
            };
            reader.readAsText(input.files[0]);
        }

        window.onload = function() {
            renderAll();
            setTimeout(() => {
                updateChart();
                fetchRealtimePrices(); // 首屏安全异步加载实时价格
            }, 300);

            // 每隔30秒在不打扰用户的前提下静默轮询最新行情
            setInterval(fetchRealtimePrices, 30000);
        }
    </script>
</body>
</html>
